---
# Headscale configuration for at-mesh
# This file is managed in the at-mesh repo for unified version control.
# Deploy: volume-mount this file into the Headscale container.

server_url: https://headscale.glados.computer
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 127.0.0.1:50443

# Database
db_type: sqlite
db_path: /data/db.sqlite

# Base domain for nodes
base_domain: mesh.glados.computer

# DNS
dns_config:
  base_domain: mesh.glados.computer
  override_local_dns: true
  nameservers:
    - 1.1.1.1

# DERP
derp:
  server:
    enabled: true
    region_id: 999
    region_code: glados
    region_name: GLaDOS DERP
    stun_listen_addr: "0.0.0.0:3478"
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: false

# Policy — database mode enables API-based policy management
policy:
  mode: database

# OIDC — at-mesh is the identity provider
oidc:
  only_start_if_oidc_is_available: true
  issuer: "https://mesh.glados.computer"
  client_id: "headscale"
  client_secret: "secret123"

# Node expiry — fallback for lifecycle sync (Phase 5)
node_expiry:
  enabled: true
  expiry_requirement: 8760h  # 1 year

# Logging
log:
  format: text
  level: info
